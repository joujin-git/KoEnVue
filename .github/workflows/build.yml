name: build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # 테스트 프로젝트를 명시 빌드 — ProjectReference 로 메인 KoEnVue.csproj 도 transitive 빌드된다.
      # 메인만 빌드하면 tests/KoEnVue.Tests.dll 이 부재해 다음 단계의 `dotnet test --no-build` 가
      # "test source file not found" 로 실패 (PR-10 Tier-3 회귀).
      - name: Restore + build (Debug)
        run: dotnet build tests/KoEnVue.Tests/ --configuration Debug

      - name: Run unit tests
        run: dotnet test tests/KoEnVue.Tests/ --configuration Debug --no-build --verbosity normal

      # NativeAOT publish 는 ~수 분 소요 — PR 마다 돌리면 비용 큼.
      # main 푸시에서만 AOT 회귀 가드로 실행. PR 회귀는 dotnet build 가 잡는다.
      - name: NativeAOT publish smoke
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: dotnet publish -r win-x64 -c Release
